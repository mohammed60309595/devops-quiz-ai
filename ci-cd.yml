name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-quiz-ai:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-quiz-ai:${{ github.sha }}

      - name: Smoke test
        run: |
          docker run -d -p 5000:5000 \
            -e GEMINI_KEY=test \
            -e STUDENT_ID=60309595 \
            --name quiz-smoke \
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-quiz-ai:latest
          sleep 15
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -s http://localhost:5000/api/health || echo "")
            echo "Attempt $i: $RESPONSE"
            if echo "$RESPONSE" | grep -q "ok"; then
              echo "Health check passed!"
              docker stop quiz-smoke
              exit 0
            fi
            sleep 5
          done
          docker logs quiz-smoke
          docker stop quiz-smoke
          exit 1

      - name: Push to Docker Hub
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-quiz-ai:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops-quiz-ai:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-test-push
    if: github.event_name == 'push'

    steps:
      - name: Deploy to Render
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_URL }}
